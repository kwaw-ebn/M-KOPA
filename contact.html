<section class="contact">
  <div class="container">
    <h2>Contact Us</h2>
    <p class="subtitle">We’d love to hear from you. Send us a message!</p>

    <div class="contact-form-container">
      <form action="#" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="tel" name="phone" placeholder="Phone Number">
        <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>

    <div class="contact-info">
      <p>Email: <a href="mailto:EbenezerK@gendtudents.org">EbenezerK@gendtudents.org</a></p>
      <p>Phone: <a href="tel:+233242590695">+233242590695</a></p>
      <p>Address: 123 Main Street, Accra, Ghana</p>
    </div>
  </div>
</section>
